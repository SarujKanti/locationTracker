<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Locate Me – Live Location</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0D47A1 0%, #1976D2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #0D47A1, #1976D2);
      border-radius: 20px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon svg { width: 44px; height: 44px; fill: white; }

    h1 {
      font-size: 26px;
      font-weight: 700;
      color: #212121;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 15px;
      color: #757575;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .code-box {
      background: #E3F2FD;
      border: 2px dashed #1565C0;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 28px;
    }

    .code-label {
      font-size: 11px;
      color: #1565C0;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .code-value {
      font-size: 32px;
      font-weight: 800;
      color: #0D47A1;
      letter-spacing: 4px;
      font-family: 'Courier New', monospace;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      margin-bottom: 12px;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:active { opacity: 0.8; }

    .btn-primary {
      background: linear-gradient(135deg, #0D47A1, #1976D2);
      color: white;
    }

    .btn-secondary {
      background: #F5F5F5;
      color: #424242;
      border: 1px solid #E0E0E0;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 4px 0 16px;
      color: #BDBDBD;
      font-size: 13px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #E0E0E0;
    }

    .status {
      font-size: 13px;
      color: #9E9E9E;
      margin-top: 8px;
      min-height: 20px;
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #E8F5E9;
      border: 1px solid #4CAF50;
      color: #2E7D32;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .live-dot {
      width: 8px; height: 8px;
      background: #4CAF50;
      border-radius: 50%;
      animation: pulse 1.4s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    footer {
      margin-top: 20px;
      font-size: 12px;
      color: #BDBDBD;
    }
  </style>
</head>
<body>
<div class="card">

  <div class="icon">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/>
    </svg>
  </div>

  <div class="live-badge">
    <span class="live-dot"></span>
    Live Location
  </div>

  <h1>Someone is sharing their location with you</h1>
  <p class="subtitle">Open the Locate Me app to track them in real‑time on the map.</p>

  <div class="code-box" id="codeBox" style="display:none">
    <div class="code-label">Session Code</div>
    <div class="code-value" id="codeDisplay">——</div>
  </div>

  <a id="btnOpenApp" class="btn btn-primary" href="#" onclick="openApp(); return false;">
    Open in Locate Me App
  </a>

  <div class="divider">or</div>

  <a id="btnPlayStore"
     class="btn btn-secondary"
     href="https://play.google.com/store/apps/details?id=com.skd.locationtracker"
     target="_blank">
    📥 Download Locate Me (Free)
  </a>

  <p class="status" id="statusText"></p>

  <footer>Powered by Locate Me · Built by Saruj Kanti Das</footer>
</div>

<script>
  var code = '';

  function getCode() {
    var params = new URLSearchParams(window.location.search);
    return (params.get('code') || '').toUpperCase();
  }

  function openApp() {
    if (!code) return;
    var deepLink = 'locateme://view?code=' + code;
    document.getElementById('statusText').textContent = 'Opening app…';

    // Try to open the app
    window.location.href = deepLink;

    // If the app didn't open after 2s, show download hint
    setTimeout(function () {
      document.getElementById('statusText').textContent =
        'App not installed? Download it below.';
    }, 2000);
  }

  // On load
  window.addEventListener('load', function () {
    code = getCode();

    if (code) {
      document.getElementById('codeBox').style.display = 'block';
      document.getElementById('codeDisplay').textContent = code;
      document.getElementById('btnOpenApp').href = 'locateme://view?code=' + code;

      // Auto-attempt to open app immediately (works on Android if installed)
      setTimeout(function () { openApp(); }, 500);
    } else {
      document.getElementById('btnOpenApp').style.display = 'none';
      document.getElementById('statusText').textContent =
        'No session code found. Ask the sharer to send you the link again.';
    }
  });
</script>
</body>
</html>
