<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Locate Me</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0D47A1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 32px 24px;
      max-width: 340px;
      width: 90%;
      text-align: center;
    }
    h2 { color: #212121; margin: 0 0 8px; font-size: 22px; }
    p  { color: #757575; font-size: 14px; margin: 0 0 20px; line-height: 1.5; }
    .code {
      background: #E3F2FD;
      border-radius: 10px;
      padding: 14px;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 4px;
      color: #0D47A1;
      font-family: monospace;
      margin-bottom: 20px;
    }
    a.btn {
      display: block;
      background: #0D47A1;
      color: #fff;
      text-decoration: none;
      padding: 14px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 15px;
    }
  </style>
</head>
<body>
<div class="card">
  <h2>📍 Live Location Shared</h2>
  <p>Install <strong>Locate Me</strong> to see this person's live location on the map.</p>
  <div class="code" id="codeBox">——</div>
  <a class="btn"
     href="https://play.google.com/store/apps/details?id=com.skd.locationtracker">
    Download Locate Me — Free
  </a>
</div>
<script>
  var code = new URLSearchParams(window.location.search).get('code');
  if (code) document.getElementById('codeBox').textContent = code.toUpperCase();
</script>
</body>
</html>
